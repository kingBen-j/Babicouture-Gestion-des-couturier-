{% extends 'BabiCouture/base.html' %}
{% block title %}Répondre{% endblock %}
{% block content %}
<div class="container mx-auto px-4 py-8 max-w-2xl">
  <h1 class="text-2xl font-bold text-gray-900 mb-4">Répondre à {{ message.expediteur.username }}</h1>
  <div class="bg-white p-6 rounded-xl shadow-sm mb-4">
    <p class="text-sm text-gray-500">Message original :</p>
    <p class="text-gray-800 italic">{{ message.contenu|truncatewords:30 }}</p>
  </div>
  <form method="post" enctype="multipart/form-data" class="bg-white p-6 rounded-xl shadow-sm space-y-4">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="bg-orange-600 text-white px-6 py-2 rounded-lg hover:bg-orange-700">Envoyer</button>
  </form>
</div>
{% endblock %}
