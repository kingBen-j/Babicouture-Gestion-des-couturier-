{% extends 'BabiCouture/base.html' %}

{% block title %}Supprimer un modele - Babi Couture{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8 max-w-xl">
    <div class="bg-white rounded-xl shadow p-6">
        <h1 class="text-xl font-bold mb-4">Confirmer la suppression</h1>
        <p class="text-gray-700 mb-6">Voulez-vous vraiment supprimer {{ modele.nom|default:"ce modele" }} ?</p>
        <form method="post" class="flex gap-3">
            {% csrf_token %}
            <button type="submit" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">Supprimer</button>
            <a href="{% url 'mes_modeles' %}" class="px-4 py-2 bg-gray-200 text-gray-800 rounded-lg hover:bg-gray-300">Annuler</a>
        </form>
    </div>
</div>
{% endblock %}
