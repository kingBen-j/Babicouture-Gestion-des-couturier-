{% extends 'BabiCouture/base.html' %}

{% block title %}Modifier un modele - Babi Couture{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8 max-w-2xl">
    <h1 class="text-2xl font-bold mb-6">Modifier le modele</h1>
    <form method="post" enctype="multipart/form-data" class="bg-white rounded-xl shadow p-6 space-y-4">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="px-4 py-2 bg-orange-600 text-white rounded-lg hover:bg-orange-700">Mettre a jour</button>
    </form>
</div>
{% endblock %}
