{% extends 'BabiCouture/base.html' %}
{% block title %}Évaluation{% endblock %}
{% block content %}
<div class="container mx-auto px-4 py-8 max-w-2xl">
  <h1 class="text-2xl font-bold text-gray-900 mb-4">Évaluation</h1>
  <div class="bg-white p-6 rounded-xl shadow-sm">
    <p class="text-gray-700">{{ evaluation.commentaire|default:"Aucun commentaire" }}</p>
    <p class="text-orange-600 font-bold mt-2">Note : {{ evaluation.note }}/5</p>
  </div>
</div>
{% endblock %}
