<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Babi Couture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #fff7ed 0%, #fed7aa 100%);
            min-height: 100vh;
        }

        .submit-btn {
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(249, 115, 22, 0.2);
        }

        .submit-btn.loading {
            opacity: 0.7;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="max-w-lg w-full">
        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">
            <div class="bg-gradient-to-r from-orange-600 to-orange-500 p-6 text-white text-center">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-white/20 rounded-full mb-4">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.121 17.804A9 9 0 1118.88 6.197M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold">Connexion</h1>
                <p class="text-orange-100 mt-2">Accedez a votre espace personnel</p>
            </div>

            <div class="p-6 md:p-8">
                {% if messages %}
                <div class="space-y-2 mb-5">
                    {% for message in messages %}
                    <div class="px-4 py-3 rounded-xl text-sm {% if message.tags == 'error' %}bg-red-50 text-red-700 border border-red-200{% else %}bg-green-50 text-green-700 border border-green-200{% endif %}">
                        {{ message }}
                    </div>
                    {% endfor %}
                </div>
                {% endif %}

                <form method="POST" id="loginForm" class="space-y-5">
                    {% csrf_token %}

                    <div>
                        <label for="username" class="block text-sm font-medium text-gray-700 mb-2">Nom d'utilisateur *</label>
                        <input type="text"
                               id="username"
                               name="username"
                               class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent transition"
                               placeholder="Ex: marie.dupont"
                               required
                               autocomplete="username">
                    </div>

                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Mot de passe *</label>
                        <input type="password"
                               id="password"
                               name="password"
                               class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent transition"
                               placeholder="Votre mot de passe"
                               required
                               autocomplete="current-password">
                    </div>

                    <div>
                        <label for="role" class="block text-sm font-medium text-gray-700 mb-2">Vous etes *</label>
                        <select id="role"
                                name="role"
                                class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent transition"
                                required>
                            <option value="">Selectionnez votre role</option>
                            <option value="client">Client</option>
                            <option value="tailor">Couturier</option>
                        </select>
                    </div>

                    <button type="submit" id="submitBtn" class="submit-btn w-full bg-orange-600 hover:bg-orange-700 text-white font-semibold py-3 rounded-xl transition">
                        Se connecter
                    </button>
                </form>

                <div class="mt-6 pt-6 border-t border-gray-100 text-center space-y-2 text-sm">
                    <p class="text-gray-600">
                        Pas encore de compte ?
                        <a href="{% url 'register_client' %}" class="text-orange-600 hover:text-orange-700 font-semibold">Inscription Client</a>
                    </p>
                    <p class="text-gray-600">
                        Vous etes couturier ?
                        <a href="{% url 'register_couturier' %}" class="text-orange-600 hover:text-orange-700 font-semibold">Inscription Couturier</a>
                    </p>
                    <p class="text-gray-500 pt-2">
                        <a href="{% url 'conditions_utilisation' %}" class="hover:text-orange-700">Conditions</a>
                        ·
                        <a href="{% url 'politique_confidentialite' %}" class="hover:text-orange-700">Politique de confidentialite</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const form = document.getElementById('loginForm');
            const submitBtn = document.getElementById('submitBtn');
            const roleField = document.getElementById('role');
            const usernameField = document.getElementById('username');

            if (usernameField) {
                usernameField.focus();
            }

            form.addEventListener('submit', function (e) {
                if (!roleField.value) {
                    e.preventDefault();
                    roleField.focus();
                    return false;
                }

                submitBtn.classList.add('loading');
                submitBtn.textContent = 'Connexion en cours...';
                submitBtn.disabled = true;
                return true;
            });
        });
    </script>
</body>
</html>
