{% extends 'BabiCouture/base.html' %}
{% block title %}Supprimer{% endblock %}
{% block content %}
<div class="container mx-auto px-4 py-8 max-w-xl text-center">
  <h1 class="text-2xl font-bold text-gray-900 mb-4">Supprimer le message ?</h1>
  <p class="text-gray-600 mb-6">{{ message.sujet }}</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit" class="bg-red-600 text-white px-6 py-2 rounded-lg hover:bg-red-700">Confirmer la suppression</button>
    <a href="{% url 'boite_reception' %}" class="ml-3 bg-gray-200 text-gray-800 px-6 py-2 rounded-lg hover:bg-gray-300">Annuler</a>
  </form>
</div>
{% endblock %}
