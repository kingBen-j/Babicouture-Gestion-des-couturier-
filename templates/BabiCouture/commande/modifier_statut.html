{% extends 'BabiCouture/base.html' %}
{% block title %}Modifier statut{% endblock %}
{% block content %}
<div class="container mx-auto px-4 py-8 max-w-xl">
  <h1 class="text-2xl font-bold text-gray-900 mb-4">Modifier le statut</h1>
  <p class="text-gray-600 mb-4">Commande #{{ commande.id }} - {{ commande.titre|default:"-" }}</p>
  <form method="post" class="bg-white p-6 rounded-xl shadow-sm space-y-4">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="bg-orange-600 text-white px-6 py-2 rounded-lg hover:bg-orange-700">Enregistrer</button>
    <a href="{% url 'details_commande' commande.id %}" class="ml-2 bg-gray-200 text-gray-800 px-4 py-2 rounded-lg hover:bg-gray-300">Annuler</a>
  </form>
</div>
{% endblock %}
