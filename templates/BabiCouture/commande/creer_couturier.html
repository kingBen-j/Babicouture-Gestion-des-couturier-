{% extends 'BabiCouture/base.html' %}
{% block title %}Commander{% endblock %}
{% block content %}
<div class="container mx-auto px-4 py-8 max-w-2xl">
  <h1 class="text-2xl font-bold text-gray-900 mb-4">Commander chez {{ couturier }}</h1>
  <form method="post" class="bg-white p-6 rounded-xl shadow-sm space-y-4">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="bg-orange-600 text-white px-6 py-2 rounded-lg hover:bg-orange-700">Passer commande</button>
  </form>
</div>
{% endblock %}
