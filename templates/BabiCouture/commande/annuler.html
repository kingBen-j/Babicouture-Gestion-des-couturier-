{% extends 'BabiCouture/base.html' %}
{% block title %}Annuler commande{% endblock %}
{% block content %}
<div class="container mx-auto px-4 py-8 max-w-xl text-center">
  <h1 class="text-2xl font-bold text-gray-900 mb-4">Annuler la commande ?</h1>
  <p class="text-gray-600 mb-6">Commande #{{ commande.id }} - {{ commande.titre|default:"-" }}</p>
  <form method="post" class="space-y-4">
    {% csrf_token %}
    <textarea name="raison" rows="3" class="w-full border rounded-lg p-3" placeholder="Raison de l'annulation (optionnel)"></textarea>
    <div class="flex justify-center gap-3">
      <button type="submit" class="bg-red-600 text-white px-6 py-2 rounded-lg hover:bg-red-700">Confirmer</button>
      <a href="{% url 'details_commande' commande.id %}" class="bg-gray-200 text-gray-800 px-4 py-2 rounded-lg hover:bg-gray-300">Annuler</a>
    </div>
  </form>
</div>
{% endblock %}
