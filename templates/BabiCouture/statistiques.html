{% extends 'BabiCouture/base.html' %}

{% block title %}Statistiques - Babi Couture{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold mb-6">Statistiques detaillees</h1>
    <div class="grid md:grid-cols-2 gap-4">
        <div class="bg-white rounded-xl shadow p-4"><p class="text-sm text-gray-600">Commandes totales</p><p class="text-2xl font-bold">{{ stats.total_commandes|default:0 }}</p></div>
        <div class="bg-white rounded-xl shadow p-4"><p class="text-sm text-gray-600">CA total</p><p class="text-2xl font-bold">{{ stats.chiffre_affaires|default:0 }} FCFA</p></div>
    </div>
</div>
{% endblock %}
