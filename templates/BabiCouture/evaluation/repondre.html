{% extends 'BabiCouture/base.html' %}
{% block title %}Répondre à l'évaluation{% endblock %}
{% block content %}
<div class="container mx-auto px-4 py-8 max-w-2xl">
  <h1 class="text-2xl font-bold text-gray-900 mb-4">Répondre à l'évaluation</h1>
  <div class="bg-white p-6 rounded-xl shadow-sm mb-4">
    <p class="text-gray-700">{{ evaluation.commentaire|default:"-" }}</p>
    <p class="text-orange-600 font-bold mt-2">Note : {{ evaluation.note }}/5</p>
  </div>
  <form method="post" class="bg-white p-6 rounded-xl shadow-sm space-y-4">
    {% csrf_token %}
    <textarea name="reponse" rows="4" class="w-full border rounded-lg p-3" placeholder="Votre réponse..."></textarea>
    <button type="submit" class="bg-orange-600 text-white px-6 py-2 rounded-lg hover:bg-orange-700">Répondre</button>
  </form>
</div>
{% endblock %}
