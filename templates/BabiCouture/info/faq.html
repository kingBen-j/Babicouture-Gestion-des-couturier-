{% extends 'BabiCouture/base.html' %}
{% block title %}FAQ{% endblock %}
{% block content %}
<div class="container mx-auto px-4 py-8 max-w-3xl">
  <h1 class="text-3xl font-bold text-gray-900 mb-6">Questions fréquentes</h1>
  <div class="space-y-4">
    {% for q in questions %}
    <div class="bg-white p-4 rounded-xl shadow-sm">
      <h2 class="font-semibold text-gray-900">{{ q.question }}</h2>
      <p class="text-gray-600 mt-1">{{ q.reponse }}</p>
    </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
