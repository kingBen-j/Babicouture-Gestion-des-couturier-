version: '3.8'

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  db:
    image: postgres:15-alpine
    container_name: babicouture_db
    environment:
      POSTGRES_DB: ${DB_NAME:-babicouture}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - babicouture_network
    restart: unless-stopped

  # ============================================
  # Redis (Cache & Message Broker)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: babicouture_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - babicouture_network
    restart: unless-stopped

  # ============================================
  # Django Web Application
  # ============================================
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: babicouture_web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn --workers 4 --bind 0.0.0.0:8000 gateway.wsgi:application"
    environment:
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=${DB_NAME:-babicouture}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    networks:
      - babicouture_network
    restart: unless-stopped

  # ============================================
  # Celery Worker (Async Tasks)
  # ============================================
  celery:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: babicouture_celery
    command: celery -A gateway worker -l info
    environment:
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here}
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=${DB_NAME:-babicouture}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
      - web
    volumes:
      - ./:/app
    networks:
      - babicouture_network
    restart: unless-stopped

  # ============================================
  # Celery Beat (Scheduled Tasks)
  # ============================================
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: babicouture_celery_beat
    command: celery -A gateway beat -l info
    environment:
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here}
      - REDIS_URL=redis://redis:6379/0
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=${DB_NAME:-babicouture}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      - db
      - redis
      - web
    volumes:
      - ./:/app
    networks:
      - babicouture_network
    restart: unless-stopped

  # ============================================
  # Nginx (Reverse Proxy & Web Server)
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: babicouture_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
      - ./ssl:/etc/nginx/ssl:ro  # Optional: SSL certificates
    depends_on:
      - web
    networks:
      - babicouture_network
    restart: unless-stopped

  # ============================================
  # pgAdmin (PostgreSQL Management UI)
  # ============================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: babicouture_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - db
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - babicouture_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local
  pgadmin_data:
    driver: local

networks:
  babicouture_network:
    driver: bridge
